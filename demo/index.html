<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>genai-coder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0908;
            --phos: #ffb000;
            --dim: #96742e;
            --faint: #4a3c1c;
            --bright: #ffd580;
            --glow: 0 0 8px rgba(255, 176, 0, 0.22);
            --mono: "VT323", "Cascadia Mono", Consolas, "Courier New", monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--mono);
            background-color: var(--bg);
            color: var(--phos);
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-size: 19px;
            line-height: 1.35;
        }
        ::selection { background: var(--phos); color: var(--bg); }

        /* status line */
        #header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 10px 22px;
            border-bottom: 1px solid var(--faint);
            flex-wrap: wrap;
        }
        #wordmark {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.04em;
            margin: 0;
            color: var(--bright);
            text-shadow: var(--glow);
        }
        #wordmark::before {
            content: "\25AA ";
            color: var(--phos);
            animation: pulse 2.4s ease-in-out infinite;
        }
        #specplate {
            font-size: 16px;
            color: var(--dim);
            letter-spacing: 0.03em;
        }
        #specplate b { color: var(--phos); font-weight: 600; }
        #sound-toggle {
            margin-left: auto;
            padding: 2px 10px;
            border: 1px solid var(--faint);
            border-radius: 3px;
            background: transparent;
            color: var(--dim);
            font-family: var(--mono);
            font-size: 15px;
            cursor: pointer;
            transition: color 0.1s, border-color 0.1s;
        }
        #sound-toggle:hover { color: var(--phos); border-color: var(--dim); }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* transcript */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 22px 22px 12px;
        }
        #messages-inner, #input-inner {
            max-width: 900px;
            margin: 0 auto;
        }
        #messages-container::-webkit-scrollbar { width: 10px; }
        #messages-container::-webkit-scrollbar-track { background: var(--bg); }
        #messages-container::-webkit-scrollbar-thumb {
            background: var(--faint);
            border-radius: 5px;
        }
        #messages-container::-webkit-scrollbar-thumb:hover { background: var(--dim); }

        /* the terminal window */
        #term-box {
            position: fixed;
            left: 50%;
            top: 13%;
            transform: translateX(-50%);
            width: 660px;
            max-width: 94vw;
            background-color: var(--bg);
            border: 4px double var(--faint);
            box-shadow: 0 0 30px rgba(255, 176, 0, 0.06);
            z-index: 5;
            transition: left 0.4s ease, top 0.4s ease, width 0.4s ease, transform 0.4s ease;
            animation: term-open 0.3s ease-out;
            transform-origin: center center;
        }
        @keyframes term-open {
            0% { transform: translateX(-50%) scale(1, 0.04); opacity: 0.4; }
            60% { transform: translateX(-50%) scale(1, 1.02); opacity: 1; }
            100% { transform: translateX(-50%) scale(1, 1); }
        }
        #term-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 12px;
            border-bottom: 1px solid var(--faint);
            color: var(--dim);
            font-size: 16px;
            letter-spacing: 0.04em;
            user-select: none;
        }
        #term-glyphs { color: var(--faint); }
        #term-body { padding: 14px 20px 18px; }
        #term-box.docked {
            left: calc(100vw - 420px);
            top: 62px;
            width: 400px;
            transform: none;
        }
        #term-box.docked #chips { display: none; }
        #term-box.docked #boot { font-size: 15px; }
        #term-box.docked #term-body { padding: 10px 14px 12px; }
        body.docked #messages-container { padding-right: 440px; }
        @media (max-width: 1100px) {
            #term-box.docked { display: none; }
            body.docked #messages-container { padding-right: 22px; }
        }
        #boot {
            margin: 0;
            font-size: 19px;
            color: var(--dim);
            white-space: pre-wrap;
            text-shadow: var(--glow);
        }
        #boot .ok { color: var(--phos); }
        #boot .val { color: var(--bright); }
        #chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
            visibility: hidden;
        }
        #chips.on { visibility: visible; }
        .chip {
            font-family: var(--mono);
            font-size: 17px;
            color: var(--phos);
            background: transparent;
            border: 1px solid var(--faint);
            border-radius: 3px;
            padding: 7px 12px;
            cursor: pointer;
            transition: background-color 0.1s, color 0.1s, border-color 0.1s;
        }
        .chip:hover, .chip:focus-visible {
            background-color: var(--phos);
            color: var(--bg);
            border-color: var(--phos);
            outline: none;
            text-shadow: none;
        }
        .chip.build::before { content: "build \203A\00a0"; }
        .chip:hover.build::before { color: var(--bg); }
        .chip.build::before { color: var(--bright); }
        #snake {
            display: block;
            margin: 30px 0 0;
            opacity: 0.85;
            image-rendering: pixelated;
        }

        .message {
            margin: 14px 0;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 100%;
        }
        .user-message {
            color: var(--dim);
        }
        .user-message::before {
            content: "> ";
            color: var(--phos);
        }
        .assistant-message {
            color: var(--phos);
            padding-left: 14px;
            border-left: 2px solid var(--faint);
        }
        .message.streaming::after {
            content: "\2588";
            color: var(--bright);
            animation: blink 1s steps(1) infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* code blocks */
        .code-wrap {
            position: relative;
            margin: 10px 0;
        }
        .code-wrap pre {
            margin: 0;
            padding: 12px 14px;
            padding-top: 30px;
            background-color: #0f0d09;
            border: 1px solid var(--faint);
            border-radius: 3px;
            overflow-x: auto;
        }
        .code-wrap code {
            font-family: var(--mono);
            font-size: 17px;
            color: var(--bright);
        }
        .code-wrap pre::-webkit-scrollbar { height: 8px; }
        .code-wrap pre::-webkit-scrollbar-track { background: transparent; }
        .code-wrap pre::-webkit-scrollbar-thumb {
            background: var(--faint);
            border-radius: 4px;
        }
        .code-wrap pre::-webkit-scrollbar-thumb:hover { background: var(--dim); }
        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 2px 9px;
            border: 1px solid var(--faint);
            border-radius: 3px;
            background-color: transparent;
            color: var(--dim);
            font-family: var(--mono);
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.1s, color 0.1s;
        }
        .copy-btn:hover {
            background-color: var(--phos);
            border-color: var(--phos);
            color: var(--bg);
        }
        .build-output { font-size: 16px; color: var(--dim); }
        .build-output.streaming::after { color: var(--bright); }

        /* prompt line */
        #input-row {
            border-top: 1px solid var(--faint);
            padding: 12px 22px 14px;
        }
        #input-inner { display: flex; gap: 8px; align-items: center; }
        #prompt-sigil { color: var(--bright); text-shadow: var(--glow); }
        #mode, #template {
            padding: 6px 6px;
            border: 1px solid var(--faint);
            border-radius: 3px;
            background-color: var(--bg);
            color: var(--dim);
            font-family: var(--mono);
            font-size: 16px;
        }
        #user-input {
            flex: 1;
            padding: 7px 12px;
            border: 1px solid var(--faint);
            border-radius: 3px;
            background-color: transparent;
            color: var(--bright);
            font-family: var(--mono);
            font-size: 19px;
            caret-color: var(--phos);
        }
        #user-input::placeholder { color: var(--dim); opacity: 0.6; }
        #user-input:focus, #mode:focus, #template:focus, #send-button:focus-visible {
            outline: 1px solid var(--phos);
            outline-offset: 1px;
        }
        #send-button {
            padding: 7px 16px;
            border: 1px solid var(--phos);
            border-radius: 3px;
            background-color: transparent;
            color: var(--phos);
            font-family: var(--mono);
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background-color 0.1s, color 0.1s;
        }
        #send-button:hover {
            background-color: var(--phos);
            color: var(--bg);
            text-shadow: none;
        }
        #send-button:disabled { opacity: 0.45; cursor: default; }

        @media (max-width: 700px) {
            #header { padding: 8px 12px; gap: 6px; }
            #messages-container { padding: 14px 12px 8px; }
            #input-row { padding: 10px 12px 12px; }
        }
        @media (prefers-reduced-motion: reduce) {
            #wordmark::before, .message.streaming::after { animation: none; }
            .chip, .copy-btn, #send-button { transition: none; }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1 id="wordmark">genai-coder</h1>
        <span id="specplate">tty1 &middot; Qwen2.5-Coder-7B &middot; QLoRA &middot; RTX A2000 &middot; SDK-currency <b>12% &rarr; 72%</b> &middot; ollama:OK</span>
        <button id="sound-toggle" title="boot chime">[&#9834; on]</button>
    </div>
    <div id="term-box">
        <div id="term-title">
            <span>genai-coder.exe</span>
            <span id="term-glyphs">&#9472;&nbsp;&#9633;&nbsp;&#215;</span>
        </div>
        <div id="term-body">
            <pre id="boot"></pre>
            <div id="chips">
                <button class="chip" data-fill="Write Python code to stream a chat response from the OpenAI API">[1] stream an openai chat reply</button>
                <button class="chip" data-fill="Call Claude with a weather tool and handle the tool_use reply">[2] claude tool calling</button>
                <button class="chip" data-fill="Get embeddings from Ollama and cosine-compare two sentences">[3] ollama embeddings</button>
                <button class="chip build" data-build="web">verified fastapi endpoint</button>
            </div>
            <canvas id="snake" width="336" height="120"></canvas>
        </div>
    </div>
    <div id="messages-container">
        <div id="messages-inner"></div>
    </div>
    <div id="input-row">
        <div id="input-inner">
            <span id="prompt-sigil">&#10095;</span>
            <select id="mode">
                <option value="chat">chat</option>
                <option value="build">build</option>
            </select>
            <select id="template" style="display: none;">
                <option value="">template&hellip;</option>
                <option value="cli">CLI tool</option>
                <option value="script">script + verify</option>
                <option value="web">web endpoint</option>
            </select>
            <input type="text" id="user-input" placeholder="type a request..." />
            <button id="send-button">[ SEND ]</button>
        </div>
    </div>

    <script>
        const userInput = document.getElementById("user-input");
        const sendButton = document.getElementById("send-button");
        const messagesContainer = document.getElementById("messages-container");
        const messagesInner = document.getElementById("messages-inner");
        const termBox = document.getElementById("term-box");
        const modeSelect = document.getElementById("mode");
        const templateSelect = document.getElementById("template");

        // boot sequence: fast, once, real specs
        const BOOT_LINES = [
            ["GENAI-CODER BIOS v2.0", "ok"],
            ["base ........ ", "", "Qwen2.5-Coder-7B-Instruct"],
            ["adapter ..... ", "", "QLoRA r16 · 748 steps · loss 0.59"],
            ["quant ....... ", "", "GGUF Q4_K_M · 4.7 GB"],
            ["gpu ......... ", "", "RTX A2000 · 12 GB · 100% local"],
            ["benchmark ... ", "", "SDK-currency 12% → 72%"],
            ["link ........ ", "", "ollama @ 127.0.0.1:11434 [OK]"],
            ["", ""],
            ["Starting genai-coder...", ""],
            ["READY. type a request, or pick a preset:", "ok"],
        ];
        const bootEl = document.getElementById("boot");
        const chipsEl = document.getElementById("chips");
        function bootLine(parts) {
            const line = document.createElement("div");
            if (parts[1] === "ok") line.className = "ok";
            line.appendChild(document.createTextNode(parts[0]));
            if (parts[2]) {
                const v = document.createElement("span");
                v.className = "val";
                v.textContent = parts[2];
                line.appendChild(v);
            }
            bootEl.appendChild(line);
        }
        const instantBoot = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (instantBoot) {
            BOOT_LINES.forEach(bootLine);
            chipsEl.classList.add("on");
        } else {
            // let the window finish its opening animation, then boot
            setTimeout(() => {
                let i = 0;
                const t = setInterval(() => {
                    bootLine(BOOT_LINES[i]);
                    i += 1;
                    if (i >= BOOT_LINES.length) {
                        clearInterval(t);
                        chipsEl.classList.add("on");
                    }
                }, 45);
            }, 320);
        }

        // boot chime: an ORIGINAL synthesized swell (the real Windows chime is
        // copyrighted). Browsers gate audio behind a user gesture, so it plays
        // on the first click/keypress. [♪] toggle remembers the choice.
        const soundToggle = document.getElementById("sound-toggle");
        let soundOn = localStorage.getItem("gc-sound") !== "off";
        let chimePlayed = false;
        function renderSoundToggle() {
            soundToggle.textContent = soundOn ? "[♪ on]" : "[♪ off]";
        }
        renderSoundToggle();
        soundToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            soundOn = !soundOn;
            localStorage.setItem("gc-sound", soundOn ? "on" : "off");
            renderSoundToggle();
        });
        function playChime() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [[261.63, 0], [392.0, 0.14], [523.25, 0.28]].forEach(([f, t]) => {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = "triangle";
                o.frequency.value = f;
                g.gain.setValueAtTime(0.0001, ctx.currentTime + t);
                g.gain.linearRampToValueAtTime(0.07, ctx.currentTime + t + 0.06);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t + 1.2);
                o.connect(g);
                g.connect(ctx.destination);
                o.start(ctx.currentTime + t);
                o.stop(ctx.currentTime + t + 1.3);
            });
        }
        function firstGesture() {
            if (!chimePlayed && soundOn) {
                chimePlayed = true;
                try { playChime(); } catch (e) {}
            }
            window.removeEventListener("pointerdown", firstGesture);
            window.removeEventListener("keydown", firstGesture);
        }
        window.addEventListener("pointerdown", firstGesture);
        window.addEventListener("keydown", firstGesture);

        // ambient snake: self-playing, eats pixel dots on the landing screen,
        // gone the moment conversation starts
        const snakeCanvas = document.getElementById("snake");
        let snakeTimer = null;
        if (!instantBoot && snakeCanvas) {
            const g = snakeCanvas.getContext("2d");
            const CELL = 8, COLS = 42, ROWS = 15;
            let snake = [[8, 7], [7, 7], [6, 7]];
            let dir = [1, 0];
            let food = [24, 7];
            const css = getComputedStyle(document.documentElement);
            const C_DIM = css.getPropertyValue("--dim").trim();
            const C_PHOS = css.getPropertyValue("--phos").trim();
            const C_BRIGHT = css.getPropertyValue("--bright").trim();
            function dropFood() {
                food = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
            }
            function tick() {
                const head = snake[0];
                const dx = food[0] - head[0];
                const dy = food[1] - head[1];
                let want = Math.abs(dx) >= Math.abs(dy)
                    ? [Math.sign(dx) || 1, 0]
                    : [0, Math.sign(dy) || 1];
                if (want[0] === -dir[0] && want[1] === -dir[1]) {
                    want = Math.abs(dx) >= Math.abs(dy) ? [0, Math.sign(dy) || 1] : [Math.sign(dx) || 1, 0];
                }
                dir = want;
                const next = [(head[0] + dir[0] + COLS) % COLS, (head[1] + dir[1] + ROWS) % ROWS];
                snake.unshift(next);
                if (next[0] === food[0] && next[1] === food[1]) {
                    dropFood();
                    if (snake.length > 12) snake.pop();
                } else {
                    snake.pop();
                }
                g.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);
                g.fillStyle = C_BRIGHT;
                g.fillRect(food[0] * CELL + 2, food[1] * CELL + 2, CELL - 4, CELL - 4);
                snake.forEach(([x, y], i) => {
                    g.fillStyle = i === 0 ? C_PHOS : C_DIM;
                    g.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
                });
            }
            snakeTimer = setInterval(tick, 110);
        } else if (snakeCanvas) {
            snakeCanvas.style.display = "none";
        }

        modeSelect.addEventListener("change", () => {
            const build = modeSelect.value === "build";
            userInput.placeholder = build ? "describe what to build..." : "type a request...";
            templateSelect.style.display = build ? "" : "none";
        });

        const TEMPLATES = {
            cli: 'Create tool.py, a CLI using only the Python standard library. Usage: python tool.py <args>. It must <describe behavior>. Wrong usage prints a usage line and exits with code 1. Verify by running: python tool.py <example> (expect <output>). Fix and re-verify on any failure, then use done.',
            script: 'Create run.py that <does X> and prints <expected output>. Verify by running python run.py and checking the output. Fix and re-verify on any failure, then use done.',
            web: 'Create app.py, a FastAPI app where GET / returns the JSON {"status": "ok"}. Imports: from fastapi import FastAPI, and import uvicorn. The app has exactly one route and returns JSON only - no HTML, no forms. At the bottom add: if __name__ == "__main__": uvicorn.run(app, host="127.0.0.1", port=8123). Never run app.py with run_command; verify ONLY with the check_http tool using cmd "python app.py" and url "http://127.0.0.1:8123/". Then use done.'
        };
        templateSelect.addEventListener("change", () => {
            if (TEMPLATES[templateSelect.value]) {
                userInput.value = TEMPLATES[templateSelect.value];
                userInput.focus();
            }
            templateSelect.value = "";
        });

        document.querySelectorAll(".chip").forEach((chip) => {
            chip.addEventListener("click", () => {
                if (chip.dataset.build) {
                    modeSelect.value = "build";
                    modeSelect.dispatchEvent(new Event("change"));
                    userInput.value = TEMPLATES[chip.dataset.build];
                } else {
                    modeSelect.value = "chat";
                    modeSelect.dispatchEvent(new Event("change"));
                    userInput.value = chip.dataset.fill;
                }
                userInput.focus();
            });
        });

        function renderRich(el, text) {
            el.replaceChildren();
            const parts = text.split("```");
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    if (parts[i]) el.appendChild(document.createTextNode(parts[i]));
                    continue;
                }
                let code = parts[i];
                const nl = code.indexOf("\n");
                if (nl !== -1 && /^[a-zA-Z0-9+#-]*\s*$/.test(code.slice(0, nl))) {
                    code = code.slice(nl + 1);
                }
                const wrap = document.createElement("div");
                wrap.className = "code-wrap";
                const pre = document.createElement("pre");
                const codeEl = document.createElement("code");
                codeEl.textContent = code;
                pre.appendChild(codeEl);
                const btn = document.createElement("button");
                btn.className = "copy-btn";
                btn.textContent = "copy";
                btn.addEventListener("click", () => {
                    navigator.clipboard.writeText(code).then(() => {
                        btn.textContent = "copied!";
                        setTimeout(() => { btn.textContent = "copy"; }, 1200);
                    });
                });
                wrap.appendChild(pre);
                wrap.appendChild(btn);
                el.appendChild(wrap);
            }
        }

        let messages = [];
        let streaming = false;
        let aborter = null;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            const mode = modeSelect.value;
            if (mode === "chat") messages.push({ role: "user", content: text });
            renderMessage({ role: "user", content: text }, true);

            userInput.value = "";
            streaming = true;
            aborter = new AbortController();
            sendButton.textContent = "[ STOP ]";
            userInput.disabled = true;

            let fullReply = "";
            let assistantBubble = null;
            try {
                const response = await fetch(mode === "build" ? "/agent" : "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(mode === "build" ? { task: text } : { messages }),
                    signal: aborter.signal
                });

                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                assistantBubble = document.createElement("div");
                assistantBubble.classList.add("message", "assistant-message", "streaming");
                if (mode === "build") assistantBubble.classList.add("build-output");
                messagesInner.appendChild(assistantBubble);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullReply += chunk;
                    if (mode === "build") {
                        assistantBubble.textContent = fullReply;
                    } else {
                        renderRich(assistantBubble, fullReply);
                    }
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                if (mode === "chat") messages.push({ role: "assistant", content: fullReply });

            } catch (error) {
                const stopped = error.name === "AbortError";
                if (mode === "chat") {
                    if (fullReply) {
                        // keep what actually streamed, so history matches the screen
                        messages.push({ role: "assistant", content: fullReply });
                    } else {
                        // nothing arrived: drop the unanswered question so it
                        // cannot poison later turns
                        messages.pop();
                    }
                }
                const note = document.createElement("div");
                note.classList.add("message", "assistant-message");
                note.textContent = stopped ? "[stopped]" : "[error: " + error.message + "]";
                messagesInner.appendChild(note);
                if (!stopped) console.error("Error sending message:", error);
            } finally {
                if (assistantBubble) assistantBubble.classList.remove("streaming");
                streaming = false;
                aborter = null;
                sendButton.textContent = "[ SEND ]";
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function renderMessage(message, isUser) {
            if (!termBox.classList.contains("docked")) {
                // first prompt: the terminal window glides to the right and
                // stays as a status panel (snake included)
                termBox.classList.add("docked");
                document.body.classList.add("docked");
            }
            const { role, content } = message;

            const messageElement = document.createElement("div");
            messageElement.classList.add("message");

            if (isUser || role === "user") {
                messageElement.classList.add("user-message");
            } else {
                messageElement.classList.add("assistant-message");
            }

            messageElement.textContent = content;
            messagesInner.appendChild(messageElement);

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        userInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter" && !streaming) {
                sendMessage();
            }
        });

        sendButton.addEventListener("click", () => {
            if (streaming && aborter) {
                aborter.abort();
            } else {
                sendMessage();
            }
        });

        userInput.focus();
    </script>
</body>
</html>
