<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>genai-coder</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1115;
            color: #e6e6e6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background-color: #161a22;
        }
        #header h1 {
            margin: 0;
            font-size: 22px;
            color: #ffffff;
        }
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background-color: #161a22;
        }
        #input-row {
            display: flex;
            border-top: 1px solid #333;
            padding-top: 12px;
            background-color: #161a22;
        }
        #user-input, #send-button {
            margin-left: auto;
        }
        #mode {
            padding: 8px;
            border: none;
            border-radius: 4px;
            margin-right: 8px;
            background-color: #282c34;
            color: #e6e6e6;
            font-size: 16px;
        }
        .build-output {
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
        }
        #user-input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px 0 0 4px;
            background-color: #2b5cd9;
            color: #ffffff;
            font-size: 16px;
        }
        #send-button {
            padding: 8px 16px;
            border: none;
            border-radius: 0 4px 4px 0;
            background-color: #32da5f;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin: 8px 0;
            max-width: 75%;
            border-radius: 12px;
            padding: 8px 12px;
            white-space: pre-wrap;
        }
        .user-message {
            background-color: #2b5cd9;
            text-align: right;
            margin-left: auto;
        }
        .assistant-message {
            background-color: #1e2128;
            text-align: left;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>genai-coder</h1>
        <span style="font-size: 14px; color: #999;">local 7B fine-tune, streaming via Ollama</span>
    </div>
    <div id="messages-container">
        <!-- Messages will be appended here -->
    </div>
    <div id="input-row">
        <select id="mode">
            <option value="chat">Chat</option>
            <option value="build">Build</option>
        </select>
        <input type="text" id="user-input" placeholder="Type a message..." />
        <button id="send-button">Send</button>
    </div>

    <script>
        const userInput = document.getElementById("user-input");
        const sendButton = document.getElementById("send-button");
        const messagesContainer = document.getElementById("messages-container");
        const modeSelect = document.getElementById("mode");

        modeSelect.addEventListener("change", () => {
            userInput.placeholder = modeSelect.value === "build"
                ? "Describe what to build..."
                : "Type a message...";
        });

        let messages = [];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            const mode = modeSelect.value;
            if (mode === "chat") messages.push({ role: "user", content: text });
            renderMessage({ role: "user", content: text }, true);

            userInput.value = "";
            sendButton.disabled = true;
            userInput.disabled = true;

            try {
                const response = await fetch(mode === "build" ? "/agent" : "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(mode === "build" ? { task: text } : { messages })
                });

                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                let fullReply = "";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                const assistantBubble = document.createElement("div");
                assistantBubble.classList.add("message", "assistant-message");
                if (mode === "build") assistantBubble.classList.add("build-output");
                messagesContainer.appendChild(assistantBubble);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullReply += chunk;
                    assistantBubble.textContent = fullReply;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                if (mode === "chat") messages.push({ role: "assistant", content: fullReply });

            } catch (error) {
                console.error("Error sending message:", error);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        function renderMessage(message, isUser) {
            const { role, content } = message;

            const messageElement = document.createElement("div");
            messageElement.classList.add("message");

            if (isUser || role === "user") {
                messageElement.classList.add("user-message");
            } else {
                messageElement.classList.add("assistant-message");
            }

            messageElement.textContent = content;
            messagesContainer.appendChild(messageElement);

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        userInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        sendButton.addEventListener("click", () => {
            sendMessage();
        });
    </script>
</body>
</html>
