<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>genai-coder</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1115;
            color: #e6e6e6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background-color: #161a22;
        }
        #header h1 {
            margin: 0;
            font-size: 22px;
            color: #ffffff;
        }
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background-color: #161a22;
        }
        #input-row {
            display: flex;
            border-top: 1px solid #333;
            padding-top: 12px;
            background-color: #161a22;
        }
        #user-input, #send-button {
            margin-left: auto;
        }
        #mode {
            padding: 8px;
            border: none;
            border-radius: 4px;
            margin-right: 8px;
            background-color: #282c34;
            color: #e6e6e6;
            font-size: 16px;
        }
        .build-output {
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
        }
        .code-wrap {
            position: relative;
            margin: 8px 0;
            text-align: left;
        }
        .code-wrap pre {
            margin: 0;
            padding: 10px 12px;
            padding-top: 30px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow-x: auto;
        }
        .code-wrap code {
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            color: #e6edf3;
        }
        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 2px 10px;
            border: none;
            border-radius: 4px;
            background-color: #282c34;
            color: #e6e6e6;
            font-size: 12px;
            cursor: pointer;
        }
        .copy-btn:hover {
            background-color: #2b5cd9;
        }
        #template {
            padding: 8px;
            border: none;
            border-radius: 4px;
            margin-right: 8px;
            background-color: #282c34;
            color: #e6e6e6;
            font-size: 16px;
        }
        #user-input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px 0 0 4px;
            background-color: #2b5cd9;
            color: #ffffff;
            font-size: 16px;
        }
        #send-button {
            padding: 8px 16px;
            border: none;
            border-radius: 0 4px 4px 0;
            background-color: #32da5f;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin: 8px 0;
            max-width: 75%;
            border-radius: 12px;
            padding: 8px 12px;
            white-space: pre-wrap;
        }
        .user-message {
            background-color: #2b5cd9;
            text-align: right;
            margin-left: auto;
        }
        .assistant-message {
            background-color: #1e2128;
            text-align: left;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>genai-coder</h1>
        <span style="font-size: 14px; color: #999;">local 7B fine-tune, streaming via Ollama</span>
    </div>
    <div id="messages-container">
        <!-- Messages will be appended here -->
    </div>
    <div id="input-row">
        <select id="mode">
            <option value="chat">Chat</option>
            <option value="build">Build</option>
        </select>
        <select id="template" style="display: none;">
            <option value="">template&hellip;</option>
            <option value="cli">CLI tool</option>
            <option value="script">script + verify</option>
            <option value="web">web endpoint</option>
        </select>
        <input type="text" id="user-input" placeholder="Type a message..." />
        <button id="send-button">Send</button>
    </div>

    <script>
        const userInput = document.getElementById("user-input");
        const sendButton = document.getElementById("send-button");
        const messagesContainer = document.getElementById("messages-container");
        const modeSelect = document.getElementById("mode");
        const templateSelect = document.getElementById("template");

        modeSelect.addEventListener("change", () => {
            const build = modeSelect.value === "build";
            userInput.placeholder = build ? "Describe what to build..." : "Type a message...";
            templateSelect.style.display = build ? "" : "none";
        });

        const TEMPLATES = {
            cli: 'Create tool.py, a CLI using only the Python standard library. Usage: python tool.py <args>. It must <describe behavior>. Wrong usage prints a usage line and exits with code 1. Verify by running: python tool.py <example> (expect <output>). Fix and re-verify on any failure, then use done.',
            script: 'Create run.py that <does X> and prints <expected output>. Verify by running python run.py and checking the output. Fix and re-verify on any failure, then use done.',
            web: 'Create app.py, a FastAPI app where GET / returns the JSON {"status": "ok"}. Imports: from fastapi import FastAPI, and import uvicorn. At the bottom add: if __name__ == "__main__": uvicorn.run(app, host="127.0.0.1", port=8123). Never run app.py with run_command; verify ONLY with the check_http tool using cmd "python app.py" and url "http://127.0.0.1:8123/". Then use done.'
        };
        templateSelect.addEventListener("change", () => {
            if (TEMPLATES[templateSelect.value]) {
                userInput.value = TEMPLATES[templateSelect.value];
                userInput.focus();
            }
            templateSelect.value = "";
        });

        function renderRich(el, text) {
            el.replaceChildren();
            const parts = text.split("```");
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    if (parts[i]) el.appendChild(document.createTextNode(parts[i]));
                    continue;
                }
                let code = parts[i];
                const nl = code.indexOf("\n");
                if (nl !== -1 && /^[a-zA-Z0-9+#-]*\s*$/.test(code.slice(0, nl))) {
                    code = code.slice(nl + 1);
                }
                const wrap = document.createElement("div");
                wrap.className = "code-wrap";
                const pre = document.createElement("pre");
                const codeEl = document.createElement("code");
                codeEl.textContent = code;
                pre.appendChild(codeEl);
                const btn = document.createElement("button");
                btn.className = "copy-btn";
                btn.textContent = "copy";
                btn.addEventListener("click", () => {
                    navigator.clipboard.writeText(code).then(() => {
                        btn.textContent = "copied!";
                        setTimeout(() => { btn.textContent = "copy"; }, 1200);
                    });
                });
                wrap.appendChild(pre);
                wrap.appendChild(btn);
                el.appendChild(wrap);
            }
        }

        let messages = [];
        let streaming = false;
        let aborter = null;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            const mode = modeSelect.value;
            if (mode === "chat") messages.push({ role: "user", content: text });
            renderMessage({ role: "user", content: text }, true);

            userInput.value = "";
            streaming = true;
            aborter = new AbortController();
            sendButton.textContent = "Stop";
            userInput.disabled = true;

            try {
                const response = await fetch(mode === "build" ? "/agent" : "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(mode === "build" ? { task: text } : { messages }),
                    signal: aborter.signal
                });

                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                let fullReply = "";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                const assistantBubble = document.createElement("div");
                assistantBubble.classList.add("message", "assistant-message");
                if (mode === "build") assistantBubble.classList.add("build-output");
                messagesContainer.appendChild(assistantBubble);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullReply += chunk;
                    if (mode === "build") {
                        assistantBubble.textContent = fullReply;
                    } else {
                        renderRich(assistantBubble, fullReply);
                    }
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                if (mode === "chat") messages.push({ role: "assistant", content: fullReply });

            } catch (error) {
                const stopped = error.name === "AbortError";
                const note = document.createElement("div");
                note.classList.add("message", "assistant-message");
                note.textContent = stopped ? "[stopped]" : "[error: " + error.message + "]";
                messagesContainer.appendChild(note);
                if (!stopped) console.error("Error sending message:", error);
            } finally {
                streaming = false;
                aborter = null;
                sendButton.textContent = "Send";
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function renderMessage(message, isUser) {
            const { role, content } = message;

            const messageElement = document.createElement("div");
            messageElement.classList.add("message");

            if (isUser || role === "user") {
                messageElement.classList.add("user-message");
            } else {
                messageElement.classList.add("assistant-message");
            }

            messageElement.textContent = content;
            messagesContainer.appendChild(messageElement);

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        userInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter" && !streaming) {
                sendMessage();
            }
        });

        sendButton.addEventListener("click", () => {
            if (streaming && aborter) {
                aborter.abort();
            } else {
                sendMessage();
            }
        });
    </script>
</body>
</html>
